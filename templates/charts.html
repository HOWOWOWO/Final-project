<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>成交彙整與圖表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    {% extends "navbar.html" %}

    {% block content %}
    <div class="container">
        <h2 class="mb-4">成交彙整與歷史圖表</h2>
        
        <div class="card mb-4">
            <div class="card-body">
                <canvas id="priceChart" width="100%" height="40"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white">歷史成交明細 (近 30 筆)</div>
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>開盤價</th>
                            <th>最高價</th>
                            <th>最低價</th>
                            <th>收盤價</th>
                            <th>成交量 (股)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in records %}
                        <tr>
                            <td>{{ r.date.strftime('%Y-%m-%d') }}</td>
                            <td>{{ r.open_price }}</td>
                            <td>{{ r.high_price }}</td>
                            <td>{{ r.low_price }}</td>
                            <td>{{ r.close_price }}</td>
                            <td>{{ "{:,}".format(r.volume) }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/chart-data')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('priceChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.dates,
                        datasets: [{
                            label: '0050 收盤價趨勢',
                            data: data.prices,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 2,
                            fill: false
                        }]
                    },
                    options: { responsive: true }
                });
            });
    </script>
    {% endblock %}
</body>
</html>
