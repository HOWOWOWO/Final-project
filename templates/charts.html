<!DOCTYPE html>
    <html lang="zh-TW">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>成交彙表與圖表</title>
            <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
        </head>
        <body>
            {% extends "navbar.html" %}

            {% block content %}
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            <style>
                /* 讓即時更新的小點有閃爍動畫效果 */
                .animate-pulse {
                    animation: pulse 2s infinite;
                }
                @keyframes pulse {
                    0% { opacity: 1; }
                    50% { opacity: 0.4; }
                    100% { opacity: 1; }
                }
            </style>
            <div class="container-fluid mt-4">
                <div class="row">
                    <div class="col-lg-7 mb-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white fw-bold text-secondary">
                                0050.TW 當日走勢圖 (即時明細轉換)
                            </div>
                            <div class="card-body">
                                <div id="chart-loading" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 text-muted">正在啟動爬蟲並讀取即時資料...</p>
                                </div>
                                <canvas id="timeSalesChart" width="400" height="220" style="display: none;"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5 mb-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center fw-bold text-secondary">
                                <span>📋 即時成交彙整 (Yahoo 股市)</span>
                                <span id="status-badge" class="badge bg-danger animate-pulse">正在讀取...</span>
                            </div>
                            <div class="card-body table-responsive" style="max-height: 500px; overflow-y: auto;">
                                <table class="table table-hover table-sm text-center align-middle">
                                    <thead class="table-light sticky-top">
                                        <tr>
                                            <th scope="col">時間</th>
                                            <th scope="col">成交價</th>
                                            <th scope="col">漲跌</th>
                                            <th scope="col">成交張數</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ticker-table-body">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <script>
                // 1. 初始化 Chart.js (先建立空圖表)
                const ctx = document.getElementById('timeSalesChart').getContext('2d');
                const timeSalesChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [], // 動態填入時間
                        datasets: [{
                            label: '即時成交價',
                            data: [], // 動態填入價格
                            borderColor: '#ef5350', // 台灣習慣紅色代表上漲
                            backgroundColor: 'rgba(239, 83, 80, 0.05)',
                            borderWidth: 2,
                            pointRadius: 1,
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: false } // 股價不從 0 開始
                        }
                    }
                });

                // 2. 當網頁載入完成後，自動向後端的 /api/time-sales 要爬蟲資料
                document.addEventListener("DOMContentLoaded", function() {
                    fetch('/api/time-sales')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP 錯誤！狀態碼: ${response.status}`);
                            }
                            return response.json();
                        })
                        .then(res => {
                            if (res.status === 'success' && res.data.length > 0) {
                                const cleanData = res.data;
                                
                                // 隱藏載入動畫，顯示圖表
                                document.getElementById('chart-loading').style.display = 'none';
                                document.getElementById('timeSalesChart').style.display = 'block';

                                // 🛠 更新右側表格
                                const tbody = document.getElementById('ticker-table-body');
                                tbody.innerHTML = ''; // 清空原本內容
                                
                                cleanData.forEach(row => {
                                    const tr = document.createElement('tr');
                                    
                                    // 根據漲跌方向動態給予顏色類別 (台灣習慣：漲紅 text-danger，跌綠 text-success)
                                    let colorClass = "text-secondary";
                                    if (row.direction === "up") colorClass = "text-danger fw-bold";
                                    if (row.direction === "down") colorClass = "text-success fw-bold";

                                    tr.innerHTML = `
                                        <td class="text-muted">${row.time}</td>
                                        <td class="${colorClass}">${row.price}</td>
                                        <td class="${colorClass}">${row.change}</td>
                                        <td class="fw-bold text-dark">${row.sheets} 張</td>
                                    `;
                                    tbody.appendChild(tr);
                                });

                                // 更新左側圖表時的欄位對接
                                const chartData = [...cleanData].reverse(); 
                                timeSalesChart.data.labels = chartData.map(row => row.time);
                                timeSalesChart.data.datasets[0].data = chartData.map(row => row.price);
                                timeSalesChart.update();

                                // 更新右上角狀態標籤
                                const badge = document.getElementById('status-badge');
                                badge.innerText = "已更新";
                                badge.classList.remove('bg-danger', 'animate-pulse');
                                badge.classList.add('bg-success');

                            } else {
                                showError("無法取得資料：" + (res.message || "欄位解析失敗"));
                            }
                        })
                        .catch(err => {
                            console.error("API 呼開失敗:", err);
                            showError("後端爬蟲伺服器異常或超時。");
                        });
                });

                // 錯誤處理顯示
                function showError(message) {
                    document.getElementById('chart-loading').innerHTML = `
                        <div class="text-danger fw-bold">❌ 載入失敗</div>
                        <div class="text-muted small mt-2">${message}</div>
                    `;
                    const badge = document.getElementById('status-badge');
                    badge.innerText = "錯誤";
                    badge.classList.remove('animate-pulse');
                }
            </script>
            {% endblock %}
        </body>
        </html>
